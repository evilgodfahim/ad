<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>502 Bad Gateway</title><style>@import url(https://fonts.googleapis.com/css2?family=Bakbak+One&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap);body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background-color:#030b21;color:#fff;text-align:center;font-size:1rem;line-height:1.4;font-family:Inter,sans-serif}.container{max-width:500px;padding:20px}.error-code{display:flex;justify-content:center;align-items:center;font-size:180px;font-weight:900;margin-bottom:50px}.error-code div{margin:0 10px;padding:35px 15px;border-radius:100px;color:#030b21}@media (max-width:500px){.error-code{font-size:120px}.error-code div{padding:25px 10px}}.error-code div:nth-child(1){animation:updown 1.5s infinite}.error-code div:nth-child(2){animation:updown 1.5s infinite .2s}.error-code div:nth-child(3){animation:updown 1.5s infinite .3s}@keyframes updown{0%{transform:translateY(0)}50%{transform:translateY(30px)}100%{transform:translateY(0)}}.blue{background-color:#01edfa}.yellow{background-color:#fde3a8}.purple{background-color:#e8c0ff}.message{font-size:30px;margin-top:20px;font-weight:900}.home-link{font-family:"Bakbak One",cursive;display:inline-block;margin-top:20px;padding:15px 40px;background-color:#00ff85;color:#000;text-decoration:none;border-radius:5px;font-weight:700}a{color:#00ff85;text-decoration:none}#datetime{padding:8px}</style></head><body><div class="container"><div class="error-code"><div class="blue">5</div><div class="yellow">0</div><div class="purple">2</div></div><div class="message">Glitch in the Matrix: Bad Gateway</div><div>The network response was not proper. We're currently smoothing out some bumps. Please refresh the page or try again later.</div><div id="datetime"></div><a href="javascript:{ location.reload(); };" class="home-link">RELOAD PAGE</a></div><script>document.getElementById("ma
